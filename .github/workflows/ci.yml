name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UBS_NO_AUTO_UPDATE: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify primary entrypoints load
        run: |
          bash -n install.sh
          bash -n ubs
          ./ubs --help >/dev/null

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq ripgrep
          npm install -g @ast-grep/cli >/dev/null

      - name: Sync Python dependencies
        run: uv sync --locked --python 3.13

      - name: Run stable manifest smoke suite
        env:
          NO_COLOR: "1"
          UBS_LOG_JSON: "1"
        run: |
          cd test-suite
          uv run python run_manifest.py --fail-fast \
            --case js-core-buggy \
            --case js-core-clean \
            --case js-node-buggy \
            --case js-node-clean \
            --case golang-buggy \
            --case golang-clean \
            --case cpp-buggy \
            --case cpp-clean \
            --case rust-buggy \
            --case rust-clean \
            --case java-buggy \
            --case java-clean \
            --case ruby-buggy \
            --case ruby-clean

      - name: Run helper test suites
        run: |
          cd test-suite
          uv run python shareable/test_shareable_reports.py
          uv run python python/tests/test_resource_helper.py
          uv run python java/tests/test_resource_lifecycle_helper.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 shellcheck

      - name: Run shellcheck (errors only)
        run: |
          shellcheck -S error \
            install.sh \
            ubs \
            modules/*.sh \
            scripts/*.sh \
            test-suite/*.sh \
            test-suite/install/run_tests.sh

      - name: Compile Python helpers
        run: python3 -m compileall scripts modules/helpers test-suite/run_manifest.py
